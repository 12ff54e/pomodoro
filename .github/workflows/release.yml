name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal

      - name: Build (release)
        shell: msys2 {0}
        run: |
          cd src-tauri
          cargo build --release

      - name: Package release
        shell: msys2 {0}
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PKG_DIR="target/release/pomodoro-v$VERSION"
          ZIP_FILE="pomodoro-v$VERSION.zip"

          rm -rf "$PKG_DIR" "$ZIP_FILE"
          mkdir -p "$PKG_DIR"
          cp src-tauri/target/release/pomodoro.exe "$PKG_DIR/"
          cp src-tauri/target/release/WebView2Loader.dll "$PKG_DIR/"

          echo "Package contents:"
          ls -lh "$PKG_DIR"/

          cd target/release
          zip -r "../../$ZIP_FILE" "pomodoro-v$VERSION"

          echo "zip=$ZIP_FILE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pomodoro v${{ env.version }}"
          files: "pomodoro-v${{ env.version }}.zip"
          generate_release_notes: true
