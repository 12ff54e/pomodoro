# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.parallel=true
android.useAndroidX=true
android.nonTransitiveRClass=true

# HTTP proxy
systemProp.http.proxyHost=127.0.0.1
systemProp.http.proxyPort=1026
systemProp.https.proxyHost=127.0.0.1
systemProp.https.proxyPort=1026

# Gradle cache in the tools drive
org.gradle.user.home=D:/app-dev-tools/.gradle

# Use JDK 21 for Gradle (JDK 26 is used for Rust cross-compilation)
org.gradle.java.home=D:/app-dev-tools/jdk-21.0.2
