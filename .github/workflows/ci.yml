name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu

      - name: Test (Rust)
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo test --release

      - name: Test (UI)
        run: node ui/test/test.js

      - name: Build (release)
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo build --release

  # E2E tests require a display and WebDriver infrastructure (tauri-driver,
  # msedgedriver). They work locally via ./test-e2e.sh but are not yet fully
  # configured for GitHub Actions headless Windows runners.
  #
  # To run locally (one-time setup):
  #   cargo install tauri-driver --locked
  #   cargo install --git https://github.com/chippers/msedgedriver-tool --locked
  #   msedgedriver-tool --install
  #   ./test-e2e.sh

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: '27.0.12077973'

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android \
                         armv7-linux-androideabi \
                         x86_64-linux-android \
                         i686-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Android APK (debug)
        run: |
          cd src-tauri
          cargo tauri android build --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pomodoro-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk
