name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu

      - name: Verify tag matches Cargo.toml version
        run: |
          $tag_version = $env:GITHUB_REF_NAME -replace '^v', ''
          $cargo_version = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          if ($tag_version -ne $cargo_version) {
            Write-Error "Tag version ($tag_version) does not match Cargo.toml version ($cargo_version)"
            exit 1
          }
          Write-Host "Tag version $tag_version matches Cargo.toml"

      - name: Build (release)
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo build --release

      - name: Package release
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          $cargo_version = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          $pkg_dir = "target\release\pomodoro-v$cargo_version"
          $zip_file = "pomodoro-v$cargo_version.zip"

          if (Test-Path $pkg_dir) { Remove-Item -Recurse -Force $pkg_dir }
          if (Test-Path $zip_file) { Remove-Item -Force $zip_file }
          New-Item -ItemType Directory -Force -Path $pkg_dir | Out-Null

          Copy-Item src-tauri\target\release\pomodoro.exe "$pkg_dir\"
          Copy-Item src-tauri\target\release\WebView2Loader.dll "$pkg_dir\"

          Write-Host "Package contents:"
          Get-ChildItem $pkg_dir | ForEach-Object { Write-Host "$($_.Length) $($_.Name)" }

          Set-Location target\release
          Compress-Archive -Path "pomodoro-v$cargo_version" -DestinationPath "..\..\$zip_file"

          "zip=$zip_file" | Out-File -Append -Encoding ascii $env:GITHUB_ENV
          "version=$cargo_version" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pomodoro v${{ env.version }}"
          files: "pomodoro-v${{ env.version }}.zip"
          generate_release_notes: true

  android-release:
    runs-on: ubuntu-latest
    # Skip job if signing secrets are not configured.
    if: ${{ vars.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: '27.0.12077973'

      - name: Install Rust Android targets
        run: |
          rustup target add aarch64-linux-android \
                         armv7-linux-androideabi \
                         x86_64-linux-android \
                         i686-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > src-tauri/gen/android/release.keystore

      - name: Build Android APK (release)
        env:
          ANDROID_KEYSTORE_PATH: release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd src-tauri
          cargo tauri android build --release

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          name: "Pomodoro v${{ env.version }}"
          files: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: false
