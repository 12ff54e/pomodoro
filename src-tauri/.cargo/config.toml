[target.x86_64-pc-windows-gnu]
rustflags = ["-C", "link-args=-Wl,--exclude-all-symbols"]
# If the MinGW toolchain is not in your PATH, uncomment and adjust:
# linker = "C:\\msys64\\mingw64\\bin\\x86_64-w64-mingw32-gcc.exe"

# Android NDK linkers (requires Android NDK installed).
# These are used by `cargo tauri android build`.
[target.aarch64-linux-android]
linker = "aarch64-linux-android21-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi21-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android21-clang"

[target.i686-linux-android]
linker = "i686-linux-android21-clang"
