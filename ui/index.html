<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Session switcher arrows -->
  <button id="session-left" title="Previous session">&#8249;</button>
  <button id="session-right" title="Next session">&#8250;</button>
  
  <div id="controls">
    <!-- Dock mode toggle -->
    <button id="dock-btn" title="Dock to top">&#9660;</button>
    <!-- Gear icon to open settings -->
    <button id="settings-btn" title="Settings">&#9881;</button>
  </div>

  <!-- Session name label -->
  <div id="session-label">Pomodoro</div>

  <!-- Phase indicator -->
  <div id="phase" class="phase-work">WORK</div>

  <!-- Timer display -->
  <div id="timer">25:00</div>

  <!-- Daily total -->
  <div id="daily-total">Today: 0m</div>

  <!-- Start / Stop button -->
  <button id="toggle-btn">Start</button>

  <!-- Continue button (shown when extendable part is in overtime) -->
  <button id="continue-btn" class="hidden">Continue</button>

  <!-- Settings panel (hidden by default) -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <h2>Settings</h2>
      <div id="sessions-container"><!-- filled by JS --></div>
      <button id="add-session-btn" class="btn-add">+ Add Session</button>
      <div class="settings-actions">
        <button id="save-settings">Save</button>
        <button id="cancel-settings" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
