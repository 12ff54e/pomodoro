name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu

      - name: Test (Rust)
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo test --release

      - name: Test (UI)
        run: node ui/test/test.js

      - name: Build (release)
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo build --release

  e2e:
    runs-on: windows-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal
          rustup default stable-x86_64-pc-windows-gnu

      - name: Cache Cargo home
        uses: actions/cache@v4
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install msedgedriver
        run: |
          cargo install --git https://github.com/chippers/msedgedriver-tool --locked
          msedgedriver-tool --install

      - name: Build app (test mode)
        env:
          POMODORO_TEST_MODE: "1"
        run: |
          $env:PATH = "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin;$env:PATH"
          cd src-tauri
          cargo build

      - name: Run E2E tests
        shell: bash
        run: |
          export PATH="/c/msys64/mingw64/bin:$PATH"
          export POMODORO_TEST_MODE=1
          cd src-tauri
          export APP_PATH="$(pwd)/target/debug/pomodoro.exe"
          export TAURI_DRIVER_URL="http://127.0.0.1:4445"

          tauri-driver --port 4445 &
          DRIVER_PID=$!

          # Wait for tauri-driver.
          for i in $(seq 1 30); do
            if curl -s "$TAURI_DRIVER_URL/status" > /dev/null 2>&1; then break; fi
            sleep 1
          done

          cargo test --features e2e-test --test e2e -- --test-threads=1 --nocapture
          EXIT_CODE=$?

          kill $DRIVER_PID 2>/dev/null || true
          exit $EXIT_CODE
