name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (MinGW-w64 toolchain)
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Rust GNU toolchain
        run: rustup toolchain install stable-x86_64-pc-windows-gnu --profile minimal

      - name: Build (release)
        run: |
          export PATH="${{ steps.msys2.outputs.msys2-location }}/mingw64/bin:$PATH"
          cd src-tauri
          cargo build --release
